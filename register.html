<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#020617,#1e3a8a);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.container{
background:#0f172a;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#3b82f6;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2563eb;
}

.login{
margin-top:15px;
}

a{
color:#22c55e;
text-decoration:none;
}

a:hover{
color:#4ade80;
}

</style>

</head>

<body>

<div class="container">

<h2>Register for Auction</h2>

<form action="/register_user" method="POST">

<input name="name" placeholder="Enter Name" required>

<input name="userid" placeholder="5 Digit ID" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<div class="login">
Already registered? <a href="/">Login</a>
</div>

</div>

</body>
</html>
