<!DOCTYPE html>
<html>

<head>

<title>Cricket Auction</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#020617,#1e3a8a);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

/* MAIN CARD */

.container{
background:rgba(15,23,42,0.9);
padding:50px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.6);
backdrop-filter: blur(8px);
}

/* TITLE */

h1{
font-size:42px;
margin-bottom:5px;
letter-spacing:2px;
color:#22c55e;
text-shadow:0 0 10px #22c55e;
}

/* SUBTITLE */

.subtitle{
color:#94a3b8;
margin-bottom:35px;
font-size:15px;
}

/* DROPDOWN */

select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:25px;
font-size:16px;
background:#1e293b;
color:white;
}

/* BUTTON */

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2563eb;
transform:scale(1.05);
}

/* DECORATIVE CRICKET ICONS */

.icons{
font-size:26px;
margin-bottom:15px;
}

.footer{
margin-top:25px;
font-size:13px;
color:#64748b;
}

</style>

</head>

<body>

<div class="container">

<div class="icons">
🏏 ⚡ 🏏
</div>

<h1>CRICKET AUCTION</h1>

<div class="subtitle">
Select a country to begin the player auction
</div>

<form action="/type" method="POST">

<select name="country">

{% for c in countries %}
<option>{{c}}</option>
{% endfor %}

</select>

<button type="submit">Start Auction</button>

</form>

<div class="footer">
Live Player Bidding System
</div>

</div>

</body>
</html>
