<!DOCTYPE html>
<html>

<head>

<title>Select Player</title>

<style>

body{
font-family:Arial;
background:#020617;
color:white;
text-align:center;
padding-top:60px;
}

.container{
width:500px;
margin:auto;
background:#0f172a;
padding:30px;
border-radius:15px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.row{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #334155;
}

a{
color:#3b82f6;
text-decoration:none;
font-weight:bold;
}

a:hover{
color:#60a5fa;
}

.price{
color:#22c55e;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Select Player</h2>

{% for player,bid in players.items() %}

<div class="row">

<div>
<a href="/auction?player={{player}}&price={{bid}}">
{{player}}
</a>
</div>

<div class="price">
₹{{bid}}
</div>

</div>

{% endfor %}

</div>

</body>

</html>
